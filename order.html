<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="veiwport" content="width=device-width, initial-scale=1.0">
        <title>Place an Order</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
            <nav class="top-nav">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="menu.html">Menu</a>
                <a href="gallery.html">Gallery</a>
                <a href="order.html">Order</a>
                <a href="contact.html">Contact</a>
            </nav>

            <img src="logo.png" class="logo">
        </header>

        <section class="page-header">
            <h1>Order Request Form</h1>
        </section>

        <section class="content">

            <form class="order-form">

                <label>Name</label>
                <input type="text">

                <label>Email</label>
                <input type="email">

                <label>Phone Number</label>
                <input type="text">

                <label>Type of Order</label>
                <select>
                    <option>Cake</option>
                    <option>Cupcakes</option>
                    <option>Cookies</option>
                    <option>Sweet Treats</option>
                    <option>Custom Order</option>
                </select>

                <label>Flavor</label>
                <input type="text">

                <label>Filling</label>
                <input type="text">
                
                <label>Buttercream</label>
                <input type="text">

                <label>Event Date</label>
                <input type="date">

                <label>Upload Inspirational Photo</label>
                <input type="file">

                <label>Additional Notes</label>
                <textarea></textarea>

                <button type="submit" class="btn">Submit Order Request</button>

            </form>
        </section>

        <footer>
            crafted with love. made to impress.
        </footer>
        
    </body>
</html>
